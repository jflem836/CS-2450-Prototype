<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8"/>
        <link rel="stylesheet" href="style.css" />
        <script src="functions.js" defer></script>
        <title>Home - UX Avengers Prototype</title>
    </head>
    <body>
        <div class="body-container"> 
            <nav>
            <!-- Navigation bar -->
            <ul class="nav-list">
                <li><button class="nav-button">Home</button></li>
                <li><button class="nav-button">Schedule</button></li>
                <li><button class="nav-button">Notifications</button></li>
                <li><button class="nav-button">Course Database</button></li>
                <li><button class="nav-button">(user profile)</button></li>
            </ul>
        </nav>

        <!-- Main content will go here -->

            </main>
